{% extends 'base.html' %}
{% block content %}

<div class="max-w-6xl mx-auto p-6">

  <!-- Header -->
  <header class="flex justify-between items-center mb-10">
    <div class="flex items-center gap-4">
      <span class="text-6xl">🍛</span>
      <div>
        <h1 class="text-4xl font-bold text-emerald-700">Delight Restaurant</h1>
        <p class="text-emerald-600">Fresh & Delicious Food</p>
      </div>
    </div>

    <button onclick="toggleCart()" 
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium">
      🛒 Cart (<span id="cart-count" class="font-bold">0</span>)
    </button>
  </header>

  <!-- Search -->
  <input id="search-input" 
         type="text" 
         placeholder="Search dishes... (e.g. biryani, dosa, paneer)" 
         class="w-full p-5 text-lg rounded-3xl border border-gray-200 focus:border-emerald-500 focus:outline-none mb-10">

  <!-- Categories -->
  <div id="categories" class="flex gap-3 overflow-x-auto pb-6 mb-8"></div>

  <!-- Menu Grid -->
  <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
  </div>

</div>

<!-- Cart Modal -->
<div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-lg mx-4 max-h-[90vh] overflow-hidden">
    
    <div class="p-6 border-b flex justify-between items-center">
      <h2 class="text-2xl font-bold">Your Cart</h2>
      <button onclick="toggleCart()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
    </div>
    
    <div id="cart-items" class="p-6 overflow-y-auto" style="max-height: 400px;">
    </div>

    <div class="p-6 border-t bg-gray-50">
      <div class="flex justify-between text-xl font-semibold mb-6">
        <span>Total</span>
        <span id="cart-total">₹0</span>
      </div>

      <button onclick="placeOrder()" 
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl text-lg font-semibold">
        Place Order
      </button>

      <button onclick="clearCart()" 
              class="w-full text-red-600 mt-3 py-3 text-sm">
        Clear Cart
      </button>
    </div>

  </div>
</div>

<!-- ✅ JS SCRIPT -->
<script>
  // Safe data from Flask
  var menuData = {{ menu | tojson | safe }} || [];
  console.log("Menu data:", menuData);

  let cart = [];

  function renderMenu() {
    const grid = document.getElementById("menu-grid");
    grid.innerHTML = "";

    menuData.forEach(item => {
      const imageHtml = item.image ? `<img src="/images/${item.image}" alt="${item.name}" class="w-full h-32 object-cover rounded-lg mb-3">` : '';
      const card = `
        <div class="p-4 border rounded-xl shadow">
          ${imageHtml}
          <h3 class="text-lg font-bold">${item.name}</h3>
          <p class="text-gray-600">₹${item.price}</p>
          <button onclick='addToCart(${JSON.stringify(item)})'
                  class="mt-3 bg-emerald-600 text-white px-4 py-2 rounded">
            Add to Cart
          </button>
        </div>
      `;
      grid.innerHTML += card;
    });
  }

  function addToCart(item) {
    cart.push(item);
    updateCart();
  }

  function updateCart() {
    document.getElementById("cart-count").innerText = cart.length;

    const cartItems = document.getElementById("cart-items");
    const totalEl = document.getElementById("cart-total");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
      total += item.price;
      cartItems.innerHTML += `
        <div class="flex justify-between mb-2">
          <span>${item.name}</span>
          <span>₹${item.price}</span>
        </div>
      `;
    });

    totalEl.innerText = "₹" + total;
  }

  function toggleCart() {
    document.getElementById("cart-modal").classList.toggle("hidden");
  }

  function clearCart() {
    cart = [];
    updateCart();
  }

  function placeOrder() {
    if (cart.length === 0) {
      alert("Cart is empty!");
      return;
    }
    alert("Order placed successfully!");
    clearCart();
    toggleCart();
  }

  // Initial render
  renderMenu();
  renderCategories();

  // Search functionality
  document.getElementById("search-input").addEventListener("input", function() {
    const searchTerm = this.value.toLowerCase();
    const filteredMenu = menuData.filter(item => 
      item.name.toLowerCase().includes(searchTerm)
    );
    renderFilteredMenu(filteredMenu);
  });

  function renderCategories() {
    const categoriesDiv = document.getElementById("categories");
    const categories = [...new Set(menuData.map(item => item.category).filter(Boolean))];
    
    if (categories.length > 0) {
      categoriesDiv.innerHTML = '<button onclick="filterByCategory(\'all\')" class="px-4 py-2 bg-emerald-100 text-emerald-700 rounded-full whitespace-nowrap">All</button>';
      categories.forEach(category => {
        categoriesDiv.innerHTML += `<button onclick="filterByCategory('${category}')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full whitespace-nowrap">${category}</button>`;
      });
    }
  }

  function filterByCategory(category) {
    let filteredMenu;
    if (category === 'all') {
      filteredMenu = menuData;
    } else {
      filteredMenu = menuData.filter(item => item.category === category);
    }
    renderFilteredMenu(filteredMenu);
  }

  function renderFilteredMenu(filteredData) {
    const grid = document.getElementById("menu-grid");
    grid.innerHTML = "";

    filteredData.forEach(item => {
      const imageHtml = item.image ? `<img src="/static/images/${item.image}" alt="${item.name}" class="w-full h-32 object-cover rounded-lg mb-3">` : '';
      const card = `
        <div class="p-4 border rounded-xl shadow">
          ${imageHtml}
          <h3 class="text-lg font-bold">${item.name}</h3>
          <p class="text-gray-600">₹${item.price}</p>
          <button onclick='addToCart(${JSON.stringify(item)})'
                  class="mt-3 bg-emerald-600 text-white px-4 py-2 rounded">
            Add to Cart
          </button>
        </div>
      `;
      grid.innerHTML += card;
    });
  }
</script>

{% endblock %}
