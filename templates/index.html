{% extends 'base.html' %}
{% block content %}

<div class="max-w-6xl mx-auto p-6">

  <!-- Header -->
  <header class="flex justify-between items-center mb-10">
    <div class="flex items-center gap-4">
      <span class="text-6xl">🍛</span>
      <div>
        <h1 class="text-4xl font-bold text-emerald-700">Delight Restaurant</h1>
        <p class="text-emerald-600">Fresh & Delicious Food</p>
      </div>
    </div>

    <button onclick="toggleCart()" 
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium">
      🛒 Cart (<span id="cart-count" class="font-bold">0</span>)
    </button>
  </header>

  <!-- Search -->
  <input id="search-input" 
         type="text" 
         placeholder="Search dishes... (e.g. biryani, dosa, paneer)" 
         class="w-full p-5 text-lg rounded-3xl border border-gray-200 focus:border-emerald-500 focus:outline-none mb-10">

  <!-- Categories -->
  <div id="categories" class="flex gap-3 overflow-x-auto pb-6 mb-8"></div>

  <!-- Menu Grid -->
  <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
  </div>

</div>

<!-- Cart Modal -->
<div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-lg mx-4 max-h-[90vh] overflow-hidden">
    
    <div class="p-6 border-b flex justify-between items-center">
      <h2 class="text-2xl font-bold">Your Cart</h2>
      <button onclick="toggleCart()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
    </div>
    
    <div id="cart-items" class="p-6 overflow-y-auto" style="max-height: 400px;">
    </div>

    <div class="p-6 border-t bg-gray-50">
      <div class="flex justify-between text-xl font-semibold mb-6">
        <span>Total</span>
        <span id="cart-total">₹0</span>
      </div>

      <button onclick="placeOrder()" 
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl text-lg font-semibold">
        Place Order
      </button>

      <button onclick="clearCart()" 
              class="w-full text-red-600 mt-3 py-3 text-sm">
        Clear Cart
      </button>
    </div>

  </div>
</div>

{% endblock %}
