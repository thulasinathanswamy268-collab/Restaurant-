<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delight Restaurant • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .menu-card {
      transition: all 0.3s ease;
    }
    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }
    .chat-window {
      max-height: 420px;
    }
  </style>
</head>
<body class="bg-amber-50 min-h-screen">
  {% block content %}{% endblock %}

  <!-- Chatbot -->
  <div class="fixed bottom-6 right-6 z-50">
    <button onclick="toggleChat()" 
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 text-lg font-medium">
      💬 Chat with us
    </button>
  </div>

  <div id="chat-window" class="hidden fixed bottom-24 right-6 w-80 bg-white rounded-3xl shadow-2xl overflow-hidden border">
    <div class="bg-emerald-600 text-white p-4 flex justify-between items-center">
      <h3 class="font-semibold">Delight Assistant</h3>
      <button onclick="toggleChat()" class="text-2xl leading-none">×</button>
    </div>
    <div id="chat-messages" class="chat-window p-4 overflow-y-auto bg-gray-50"></div>
    <div class="p-4 border-t">
      <input id="chat-input" 
             type="text" 
             placeholder="Ask about menu, prices, or orders..." 
             class="w-full p-3 border rounded-2xl focus:outline-none focus:border-emerald-500"
             onkeypress="if(event.key === 'Enter') sendMessage()">
    </div>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
